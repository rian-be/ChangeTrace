Gpu:
  - changed-files:
      - any-glob-to-any-file:
          - src/Graphics/Gpu/**
          - src/**/OpenGL/**
          - src/Graphics/Shaders/**
          - Assets/Shaders/**

Layout:
  - changed-files:
      - any-glob-to-any-file:
          - src/**/Layout/**

Renderer:
  - changed-files:
      - any-glob-to-any-file:
          - src/Graphics/Rendering/**
          - src/Rendering/**

tests:
  - changed-files:
      - any-glob-to-any-file:
          - Tests/**
          - '**/*Tests.cs'

Benchmark:
  - changed-files:
      - any-glob-to-any-file:
          - Benchmarks/**

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - Docs/**
          - '*.md'
          - readme.md

ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**

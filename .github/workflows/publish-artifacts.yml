name: Publish Artifacts

on:
  workflow_call:
    inputs:
      package_version:
        description: "Optional tool package version, usually the release tag without the leading v."
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  tool-package:
    name: Pack global tool
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ChangeTrace.csproj

      - name: Resolve package version
        id: version
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="$PACKAGE_VERSION"
          if [ -z "$version" ]; then
            version="$REF_NAME"
          fi
          version="${version#v}"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+(\.[0-9]+){1,2}([-+][0-9A-Za-z.-]+)?$'; then
            version="0.1.0"
          fi
          echo "package_version=$version" >> "$GITHUB_OUTPUT"

      - name: Pack tool
        run: >
          dotnet pack ChangeTrace.csproj
          -c Release
          --no-restore
          -p:PackageVersion=${{ steps.version.outputs.package_version }}

      - name: Upload tool package
        uses: actions/upload-artifact@v4
        with:
          name: ChangeTrace-tool
          path: nupkg/*.nupkg

  publish:
    name: Publish ${{ matrix.runtime }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        runtime:
          - win-x64
          - linux-x64
          - linux-arm64
          - osx-x64
          - osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ChangeTrace.csproj

      - name: Publish
        run: >
          dotnet publish ChangeTrace.csproj
          -c Release
          -r ${{ matrix.runtime }}
          --self-contained false
          -p:UseAppHost=true
          -o publish/${{ matrix.runtime }}

      - name: Pack artifact
        env:
          RUNTIME: ${{ matrix.runtime }}
          PUBLISH_DIR: publish/${{ matrix.runtime }}
          DIST_DIR: dist
        run: python3 -m scripts.releases.package_artifact

      - name: Generate artifact attestation
        id: attest
        uses: actions/attest@v4
        with:
          subject-path: dist/ChangeTrace-${{ matrix.runtime }}.zip

      - name: Pack attestation bundle
        env:
          RUNTIME: ${{ matrix.runtime }}
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
          DIST_DIR: dist
        run: python3 -m scripts.releases.package_artifact

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChangeTrace-${{ matrix.runtime }}
          path: |
            dist/ChangeTrace-${{ matrix.runtime }}.zip
            dist/ChangeTrace-${{ matrix.runtime }}.sigstore.json

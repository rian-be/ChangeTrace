name: Publish Artifacts

on:
  workflow_call:

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  publish:
    name: Publish ${{ matrix.runtime }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        runtime:
          - win-x64
          - linux-x64
          - linux-arm64
          - osx-x64
          - osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ChangeTrace.csproj

      - name: Publish
        run: >
          dotnet publish ChangeTrace.csproj
          -c Release
          -r ${{ matrix.runtime }}
          --self-contained false
          -p:UseAppHost=true
          -o publish/${{ matrix.runtime }}

      - name: Pack artifact
        env:
          RUNTIME: ${{ matrix.runtime }}
          PUBLISH_DIR: publish/${{ matrix.runtime }}
          DIST_DIR: dist
        run: python3 -m scripts.releases.package_artifact

      - name: Generate artifact attestation
        id: attest
        uses: actions/attest@v4
        with:
          subject-path: dist/ChangeTrace-${{ matrix.runtime }}.zip

      - name: Pack attestation bundle
        env:
          RUNTIME: ${{ matrix.runtime }}
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
          DIST_DIR: dist
        run: python3 -m scripts.releases.package_artifact

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChangeTrace-${{ matrix.runtime }}
          path: |
            dist/ChangeTrace-${{ matrix.runtime }}.zip
            dist/ChangeTrace-${{ matrix.runtime }}.sigstore.json

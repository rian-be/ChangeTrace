name: Pre Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Pre-release tag, for example v0.62.24-pre.1"
        required: true
        type: string
      release_name:
        description: "Release title. Defaults to tag name."
        required: false
        type: string
  push:
    tags:
      - "v*-pre*"
      - "v*-alpha*"
      - "v*-beta*"
      - "v*-rc*"

permissions:
  contents: write
  pull-requests: read
  id-token: write
  attestations: write

jobs:
  publish:
    uses: ./.github/workflows/publish-artifacts.yml
    with:
      package_version: ${{ inputs.tag_name || github.ref_name }}

  release:
    name: Create GitHub pre-release
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: python3 -m scripts.releases.prepare_prerelease

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum ChangeTrace-*.zip ChangeTrace*.nupkg > SHA256SUMS.txt

      - name: Draft pre-release notes
        uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
          tag: ${{ steps.meta.outputs.tag_name }}
          version: ${{ steps.meta.outputs.release_version }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: true
          publish: true
          latest: false
          commitish: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload pre-release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag_name }}
          DIST_DIR: dist
          ASSET_PATTERNS: |
            ChangeTrace-*.zip
            ChangeTrace*.nupkg
            SHA256SUMS.txt
        run: python3 -m scripts.releases.upload_release_assets

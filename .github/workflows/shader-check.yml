name: Shader Check

on:
  pull_request:
    paths:
      - "Assets/**"
      - "src/Graphics/Shaders/**"
      - "src/Graphics/Gpu/**"
      - "src/Graphics/Rendering/**"
      - ".github/workflows/shader-check.yml"

  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "Assets/**"
      - "src/Graphics/Shaders/**"
      - "src/Graphics/Gpu/**"
      - "src/Graphics/Rendering/**"

permissions:
  contents: read

jobs:
  shader-check:
    name: Shader validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run shader validation
        run: python3 -m scripts.checks.validate_shaders
